<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Presentación de Valentina</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            text-align: center;
            padding: 30px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
        }
        p {
            color: #555;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>Hola, soy Valentina 👋</h1>

    <p>Tengo 19 años (casi 20 🎉).</p>

    <p>Nací el 18 de mayo de 2006 en Valencia, Venezuela.</p>

    <p>No viví mucho tiempo allí, ya que a los 10 años,
    el 10 de abril de 2017, me mudé a Argentina.</p>

    <p>Actualmente llevo 9 años viviendo aquí 🇦🇷.</p>

    <p>Estoy estudiando la carrera de Artes Multimediales 🎨💻.</p>
</div>

</body>
</html>
